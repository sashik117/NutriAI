services:
  - type: web
    name: nutriai
    runtime: node
    plan: free
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm run start:deploy
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: nutriai-db
          property: connectionString
      - key: DATABASE_SSL
        value: "true"
      - key: DATABASE_SCHEMA
        value: public
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash-lite
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4.1-mini
      - key: LOCAL_USER_EMAIL
        value: local@nutriai.app
      - key: LOCAL_USER_NAME
        value: Local User

databases:
  - name: nutriai-db
    plan: free
    databaseName: nutriai
    user: nutriai_user
